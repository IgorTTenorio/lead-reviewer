services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lead_reviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lead_reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: lead-reviewer
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/lead_reviewer
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/lead_reviewer
      AI_PROVIDER: mock
      AI_MODEL: keyword-heuristic-v1
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["./docker/app/start-api.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: lead-reviewer
      APP_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/lead_reviewer
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/lead_reviewer
      AI_PROVIDER: mock
      AI_MODEL: keyword-heuristic-v1
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "true"
    command: ["./docker/app/start-worker.sh"]

volumes:
  postgres_data:
  redis_data:
